<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>WebBox V20 - Anime Gods</title>
    <style>
        body { margin: 0; display: flex; background: #111; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; user-select: none; }
        
        #sidebar { width: 280px; background: linear-gradient(to bottom, #2a2a2a, #1a1a1a); height: 100vh; padding: 15px; box-sizing: border-box; border-right: 3px solid #444; overflow-y: auto; z-index: 10; box-shadow: 5px 0 15px rgba(0,0,0,0.5); }
        #gameCanvas { flex-grow: 1; cursor: crosshair; }
        
        button { width: 100%; padding: 8px; margin-bottom: 6px; cursor: pointer; background: #333; color: white; border: 1px solid #555; border-radius: 6px; font-weight: bold; transition: 0.1s; font-size: 0.9em; }
        button:hover { background: #444; }
        button.active { background: #e67e22; border-color: #f1c40f; box-shadow: 0 0 10px rgba(230, 126, 34, 0.5); }
        
        /* Dynamic Team Colors */
        .team-btn.blue { background: #2980b9; border-color: #3498db; }
        .team-btn.red { background: #c0392b; border-color: #e74c3c; }
        .team-btn.green { background: #27ae60; border-color: #2ecc71; }
        .team-btn.yellow { background: #f39c12; border-color: #f1c40f; color: #111; }
        .team-btn.orange { background: #d35400; border-color: #e67e22; }
        .team-btn.purple { background: #8e44ad; border-color: #9b59b6; }
        
        .anime-btn { background: #f1c40f; color: #111; border-color: #f39c12; text-transform: uppercase; letter-spacing: 1px; }
        .anime-btn:hover { background: #f39c12; }
        
        .stat-panel { background: rgba(0,0,0,0.3); padding: 10px; border-radius: 8px; margin-bottom: 10px; font-size: 0.85em; border: 1px solid #444; text-align: center; }
        h2 { margin: 0 0 8px 0; color: #f1c40f; text-align: center; letter-spacing: 1px; font-size: 1.3em;}
        hr { border: 0; border-top: 1px solid #444; margin: 10px 0; }
    </style>
</head>
<body>

    <div id="sidebar">
        <h2>WEBBOX V20</h2>
        <div class="stat-panel">
            <b style="font-size:1.2em">Warriors Alive: <span id="total-count" style="color:#2ecc71">0</span></b><br><br>
            Tool: <span id="current-tool" style="color:#f1c40f;">Normal</span>
        </div>
        
        <button id="teamToggle" onclick="toggleTeam()" class="team-btn blue">Team: BLUE</button>
        <button onclick="toggleWall()" style="background: #555;">Toggle Wall</button>
        <hr>
        <b>Basic Units</b>
        <button onclick="setPower('spawn-normal', this)" class="active">Normal</button>
        <button onclick="setPower('spawn-archer', this)">Archer</button>
        <button onclick="setPower('spawn-knight', this)">Knight</button>
        <button onclick="setPower('spawn-ninja', this)">Ninja</button>
        <button onclick="setPower('spawn-swapper', this)">Swapper</button>
        <button onclick="setPower('spawn-shifter', this)">Shifter</button>
        <hr>
        <b style="color: #f1c40f;">Anime Gods (Solo Teams)</b>
        <button onclick="setPower('spawn-luffy', this)" class="anime-btn">🏴‍☠️ Spawn Luffy</button>
        <button onclick="setPower('spawn-gojo', this)" class="anime-btn">🤞 Spawn Gojo</button>
        <button onclick="setPower('spawn-naruto', this)" class="anime-btn">🦊 Spawn Naruto</button>
        <button onclick="setPower('spawn-goku', this)" class="anime-btn">🐉 Spawn Goku</button>
        <hr>
        <b>Powers</b>
        <button onclick="setPower('weapon', this)">🗡️ Give Weapon</button>
        <button onclick="setPower('fire', this)">🔥 Fire Power</button>
        <button onclick="setPower('ice', this)">❄️ Ice Power</button>
        <button onclick="setPower('strike', this)">⚡ Smite (Kill)</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const toolDisplay = document.getElementById('current-tool');

        let people = [];
        let projectiles = [];
        
        let currentPower = 'spawn-normal';
        const teams = ['blue', 'red', 'green', 'yellow', 'orange', 'purple'];
        let currentTeamIdx = 0;
        let wallOpen = true;

        const teamColors = {
            'blue': '#3498db', 'red': '#e74c3c', 'green': '#2ecc71', 
            'yellow': '#f1c40f', 'orange': '#e67e22', 'purple': '#9b59b6',
            'luffy': '#c0392b', 'gojo': '#bdc3c7', 'naruto': '#f39c12', 'goku': '#e67e22', 'kurama': '#d35400'
        };

        function resize() { canvas.width = window.innerWidth - 280; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();

        function toggleTeam() {
            currentTeamIdx = (currentTeamIdx + 1) % teams.length;
            let team = teams[currentTeamIdx];
            let btn = document.getElementById('teamToggle');
            btn.className = `team-btn ${team}`;
            btn.innerText = `Team: ${team.toUpperCase()}`;
        }

        function setPower(power, btn) {
            currentPower = power;
            toolDisplay.innerText = power.replace('spawn-', '').toUpperCase();
            document.querySelectorAll('#sidebar button').forEach(b => {
                if(b.id !== 'teamToggle' && !b.innerText.includes('Wall')) b.classList.remove('active');
            });
            btn.classList.add('active');
        }

        function toggleWall() { wallOpen = !wallOpen; }

        class Projectile {
            constructor(x, y, target, dmg, team, type) {
                this.x = x; this.y = y; this.target = target; this.dmg = dmg; this.team = team; this.type = type; 
                let angle = Math.atan2(target.y - y, target.x - x);
                let speed = 12;
                this.vx = Math.cos(angle) * speed; this.vy = Math.sin(angle) * speed;
                this.active = true;
            }
            update() {
                this.x += this.vx; this.y += this.vy;
                if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) this.active = false;
                
                if (this.target && this.target.hp > 0 && Math.hypot(this.x - this.target.x, this.y - this.target.y) < 25) {
                    this.target.hp -= this.dmg; this.target.flashTimer = 5;
                    if (this.type === 'ice') this.target.freezeTimer = 80;
                    if (this.type === 'fire') this.target.hp -= 5; 
                    
                    this.target.vx += this.vx * 0.5; this.target.vy += this.vy * 0.5;
                    this.active = false;
                }
            }
            draw() {
                ctx.fillStyle = this.type === 'fire' ? '#f39c12' : (this.type === 'ice' ? '#00ffff' : '#fff');
                ctx.beginPath(); ctx.arc(this.x, this.y, 6, 0, Math.PI * 2); ctx.fill();
            }
        }

        class Person {
            constructor(x, y, team, role) {
                this.x = x; this.y = y; this.team = team; this.role = role; 
                this.isShifter = (role === 'shifter');
                this.isAnime = ['luffy', 'gojo', 'naruto', 'goku', 'kurama'].includes(role);
                
                if (this.isAnime) this.team = role; // Anime chars fight for themselves

                this.hp = 100;
                if(role === 'knight') this.hp = 150;
                if(role === 'swapper') this.hp = 120;
                if(this.isAnime) this.hp = role === 'goku' ? 750 : 500;
                if(role === 'kurama') this.hp = 1000;
                this.maxHp = this.hp;

                this.weapon = null; this.hasFire = false; this.hasIce = false;
                this.freezeTimer = 0; this.flashTimer = 0;
                this.cooldown = 0; this.dashTimer = 0;
                this.ninjaOrbitDir = Math.random() > 0.5 ? 1 : -1;
                this.aimAngle = 0;
                this.vx = 0; this.vy = 0;

                // Anime Specific States
                this.punchTimer = 0; this.punchX = 0; this.punchY = 0;
                this.kamehamehaTimer = 0; this.usedKamehameha = false;
                this.gojoAttack = 0; // 1=Red, 2=Blue, 3=Purple
                this.gojoTimer = 0;
            }

            draw() {
                ctx.save();
                if (this.flashTimer > 0) {
                    ctx.fillStyle = 'white'; this.flashTimer--;
                } else {
                    ctx.fillStyle = teamColors[this.team] || '#fff';
                    if (this.hasFire) ctx.fillStyle = '#ff4500'; 
                    if (this.hasIce) ctx.fillStyle = '#a0e7ff'; 
                }

                let dir = Math.cos(this.aimAngle) >= 0 ? 1 : -1;
                if(this.vx !== 0) dir = this.vx >= 0 ? 1 : -1;

                // --- ANIME ABILITY EFFECTS ---
                if (this.role === 'luffy' && this.punchTimer > 0) {
                    ctx.strokeStyle = '#f1c27d'; ctx.lineWidth = 6;
                    ctx.beginPath(); ctx.moveTo(this.x, this.y); ctx.lineTo(this.punchX, this.punchY); ctx.stroke();
                    ctx.fillStyle = '#e67e22'; ctx.beginPath(); ctx.arc(this.punchX, this.punchY, 15, 0, Math.PI*2); ctx.fill();
                    this.punchTimer--;
                }
                if (this.role === 'goku' && this.kamehamehaTimer > 0) {
                    ctx.fillStyle = `rgba(0, 255, 255, ${this.kamehamehaTimer/60})`;
                    ctx.fillRect(0, this.y - 40, canvas.width, 80);
                    ctx.fillStyle = `rgba(255, 255, 255, ${this.kamehamehaTimer/60})`;
                    ctx.fillRect(0, this.y - 20, canvas.width, 40);
                    this.kamehamehaTimer--;
                }
                if (this.role === 'gojo' && this.gojoTimer > 0) {
                    ctx.beginPath(); ctx.arc(this.x, this.y, (30 - this.gojoTimer)*5, 0, Math.PI*2);
                    if(this.gojoAttack === 1) { ctx.fillStyle = `rgba(255, 0, 0, ${this.gojoTimer/30})`; ctx.fill(); }
                    if(this.gojoAttack === 2) { ctx.fillStyle = `rgba(0, 0, 255, ${this.gojoTimer/30})`; ctx.fill(); }
                    if(this.gojoAttack === 3) { 
                        ctx.fillStyle = `rgba(142, 68, 173, ${this.gojoTimer/30})`; 
                        ctx.fillRect(0, this.y - 60, canvas.width, 120); // Purple is a massive beam
                    }
                    this.gojoTimer--;
                }

                // --- CHARACTER BODIES ---
                if (this.role === 'kurama') {
                    ctx.fillStyle = '#d35400';
                    ctx.fillRect(this.x - 30, this.y - 20, 60, 40); // Body
                    ctx.beginPath(); ctx.arc(this.x + (30*dir), this.y - 10, 20, 0, Math.PI*2); ctx.fill(); // Head
                    ctx.fillStyle = '#111'; ctx.beginPath(); ctx.moveTo(this.x+(30*dir), this.y-25); ctx.lineTo(this.x+(20*dir), this.y-35); ctx.lineTo(this.x+(40*dir), this.y-25); ctx.fill(); // Ears
                    ctx.strokeStyle = '#e67e22'; ctx.lineWidth = 5;
                    for(let i=0; i<9; i++) { // 9 Tails
                        ctx.beginPath(); ctx.moveTo(this.x - (25*dir), this.y + 10);
                        ctx.quadraticCurveTo(this.x - (60*dir), this.y - 20 + (i*5), this.x - (40*dir), this.y - 40 + (i*10)); ctx.stroke();
                    }
                }
                else {
                    // Standard Body
                    ctx.beginPath(); ctx.arc(this.x, this.y - 16, 10, 0, Math.PI * 2); ctx.fill();
                    ctx.fillRect(this.x - 8, this.y - 6, 16, 24);
                    ctx.fillRect(this.x - 8, this.y + 18, 6, 14); ctx.fillRect(this.x + 2, this.y + 18, 6, 14);

                    // Cosmetics
                    if (this.role === 'knight') {
                        ctx.fillStyle = '#7f8c8d'; ctx.fillRect(this.x - 10, this.y - 6, 20, 24); 
                        // Horse
                        ctx.fillStyle = '#8B4513'; ctx.fillRect(this.x-15, this.y+5, 30, 15); ctx.fillRect(this.x+(10*dir), this.y-5, 10, 15);
                    } 
                    else if (this.role === 'ninja') {
                        ctx.fillStyle = '#222'; ctx.fillRect(this.x - 8, this.y - 18, 16, 6); 
                    } 
                    else if (this.role === 'archer') {
                        ctx.fillStyle = '#2ecc71'; ctx.beginPath(); ctx.arc(this.x, this.y - 22, 6, Math.PI, 0); ctx.fill();
                        ctx.strokeStyle = '#8B4513'; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(this.x+(10*dir), this.y-6, 15, -Math.PI/2.5, Math.PI/2.5); ctx.stroke();
                    }
                    else if (this.role === 'luffy') {
                        // Straw Hat
                        ctx.fillStyle = '#f1c40f'; ctx.beginPath(); ctx.ellipse(this.x, this.y-22, 14, 4, 0, 0, Math.PI*2); ctx.fill();
                        ctx.beginPath(); ctx.arc(this.x, this.y-22, 8, Math.PI, 0); ctx.fill();
                        ctx.fillStyle = 'red'; ctx.fillRect(this.x-8, this.y-23, 16, 3);
                    }
                    else if (this.role === 'gojo') {
                        // White Hair & Blindfold
                        ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(this.x, this.y-20, 11, Math.PI, 0); ctx.fill();
                        ctx.fillStyle = '#111'; ctx.fillRect(this.x-10, this.y-18, 20, 6);
                    }
                    else if (this.role === 'goku') {
                        // Spiky Hair & Orange Gi
                        ctx.fillStyle = '#111'; 
                        for(let i=0; i<5; i++) { ctx.beginPath(); ctx.moveTo(this.x, this.y-16); ctx.lineTo(this.x-15+(i*7), this.y-30); ctx.lineTo(this.x+5, this.y-16); ctx.fill(); }
                        ctx.fillStyle = '#e67e22'; ctx.fillRect(this.x - 8, this.y - 6, 16, 24);
                    }
                    else if (this.role === 'naruto') {
                        // Spiky Yellow Hair & Whiskers
                        ctx.fillStyle = '#f1c40f'; 
                        for(let i=0; i<4; i++) { ctx.beginPath(); ctx.moveTo(this.x, this.y-16); ctx.lineTo(this.x-12+(i*8), this.y-28); ctx.lineTo(this.x+2, this.y-16); ctx.fill(); }
                        ctx.fillStyle = '#111'; ctx.fillRect(this.x+(3*dir), this.y-16, 4, 1); ctx.fillRect(this.x+(3*dir), this.y-14, 4, 1);
                    }
                }

                if (this.weapon && !this.isAnime) {
                    ctx.strokeStyle = '#ecf0f1'; ctx.lineWidth = 4; ctx.beginPath();
                    let length = this.weapon === 'spear' ? 40 : 24; 
                    ctx.moveTo(this.x, this.y); ctx.lineTo(this.x + Math.cos(this.aimAngle) * length, this.y + Math.sin(this.aimAngle) * length); ctx.stroke();
                }

                // HP Bar
                let hpBarY = this.y - (this.role === 'kurama' ? 55 : 40);
                ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(this.x - 15, hpBarY, 30, 4);
                let hpRatio = Math.min(1.0, Math.max(0, this.hp / this.maxHp)); 
                ctx.fillStyle = hpRatio > 0.4 ? '#2ecc71' : '#e74c3c'; 
                ctx.fillRect(this.x - 15, hpBarY, hpRatio * 30, 4);

                ctx.restore();
            }

            update() {
                if (this.cooldown > 0) this.cooldown--;
                if (this.dashTimer > 0) this.dashTimer--;

                let nearestEnemy = null;
                let minDist = Infinity;

                people.forEach(other => {
                    if (other.team !== this.team && other.hp > 0) {
                        // Anime chars ignore walls
                        let isBlockedByWall = !wallOpen && !this.isAnime && !other.isAnime && ((this.team === 'blue' && other.x > canvas.width / 2) || (this.team === 'red' && other.x < canvas.width / 2));
                        if (!isBlockedByWall) {
                            let d = Math.hypot(this.x - other.x, this.y - other.y);
                            if (d < minDist) { minDist = d; nearestEnemy = other; }
                        }
                    }
                });

                let speedLimit = this.isAnime ? 4.5 : (this.role === 'knight' ? 4.0 : 3.0);
                if (this.role === 'goku') speedLimit = 6.0;
                if (this.role === 'kurama') speedLimit = 2.0;
                if (this.dashTimer > 0) speedLimit = 15.0; 

                if (nearestEnemy) {
                    let angle = Math.atan2(nearestEnemy.y - this.y, nearestEnemy.x - this.x);
                    this.aimAngle = angle;

                    // --- ANIME LOGIC ---
                    if (this.role === 'luffy' && minDist < canvas.width/2 && this.cooldown <= 0) {
                        this.punchX = nearestEnemy.x; this.punchY = nearestEnemy.y;
                        this.punchTimer = 15; this.cooldown = 300; // 5 sec
                        nearestEnemy.hp -= 150; nearestEnemy.flashTimer = 10;
                        nearestEnemy.vx += Math.cos(angle)*20; nearestEnemy.vy += Math.sin(angle)*20; // Massive knockback
                    }
                    
                    if (this.role === 'gojo' && minDist < 300 && this.cooldown <= 0) {
                        this.gojoTimer = 30; this.cooldown = 200;
                        let roll = Math.random();
                        if(roll < 0.33) {
                            this.gojoAttack = 1; // Red: Repel
                            people.forEach(p => { if(p.team !== this.team && Math.hypot(this.x-p.x, this.y-p.y) < 150) {
                                p.hp -= 80; let ang = Math.atan2(p.y-this.y, p.x-this.x); p.vx += Math.cos(ang)*25; p.vy += Math.sin(ang)*25;
                            }});
                        } else if (roll < 0.66) {
                            this.gojoAttack = 2; // Blue: Attract
                            people.forEach(p => { if(p.team !== this.team && Math.hypot(this.x-p.x, this.y-p.y) < 250) {
                                p.hp -= 50; let ang = Math.atan2(p.y-this.y, p.x-this.x); p.vx -= Math.cos(ang)*20; p.vy -= Math.sin(ang)*20;
                            }});
                        } else {
                            this.gojoAttack = 3; // Purple: Erase
                            people.forEach(p => { if(p.team !== this.team && Math.abs(p.y - this.y) < 60) p.hp -= 300; });
                        }
                    }

                    if (this.role === 'goku' && minDist < 400 && !this.usedKamehameha) {
                        this.usedKamehameha = true; this.kamehamehaTimer = 60;
                        people.forEach(p => { if(p.team !== this.team && Math.abs(p.y - this.y) < 60) p.hp -= 9999; });
                    }

                    if (this.role === 'naruto' && this.cooldown <= 0) {
                        let k = new Person(this.x, this.y, this.team, 'kurama');
                        people.push(k); this.cooldown = 600; // 10 sec to summon again
                    }

                    // Shifter (immune to Anime steal)
                    if (this.isShifter && this.cooldown <= 0 && minDist < 150 && !nearestEnemy.isShifter && !nearestEnemy.isAnime) {
                        this.role = nearestEnemy.role; nearestEnemy.role = 'normal';
                        if (nearestEnemy.hasFire) { this.hasFire = true; nearestEnemy.hasFire = false; }
                        if (nearestEnemy.hasIce) { this.hasIce = true; nearestEnemy.hasIce = false; }
                        if (nearestEnemy.weapon) { this.weapon = nearestEnemy.weapon; nearestEnemy.weapon = null; }
                        this.cooldown = 10; nearestEnemy.flashTimer = 10;
                        nearestEnemy.vx -= Math.cos(angle) * 15; nearestEnemy.vy -= Math.sin(angle) * 15;
                    }
                    
                    if ((this.hasFire || this.hasIce) && minDist < 300 && this.cooldown <= 0 && (wallOpen || Math.abs(this.x - nearestEnemy.x) > 30)) {
                        let type = this.hasFire ? 'fire' : 'ice';
                        projectiles.push(new Projectile(this.x, this.y, nearestEnemy, 10, this.team, type));
                        this.cooldown = 60; this.vx -= Math.cos(angle) * 5; this.vy -= Math.sin(angle) * 5;
                    }

                    if (!this.isAnime && this.role !== 'archer' && minDist < 150 && minDist > 50 && this.cooldown <= 0 && this.dashTimer <= 0) {
                        this.dashTimer = 10; this.cooldown = 80;
                        this.vx += Math.cos(angle) * 15; this.vy += Math.sin(angle) * 15;
                    }

                    if (this.role === 'swapper' && this.cooldown <= 0 && minDist < 150) {
                        let possibleTargets = people.filter(p => p !== this && p.hp > 0 && !p.isAnime);
                        if (possibleTargets.length > 0) {
                            nearestEnemy.hp -= 10; nearestEnemy.flashTimer = 5;
                            nearestEnemy.vx += Math.cos(angle) * 10; nearestEnemy.vy += Math.sin(angle) * 10;
                            let target = possibleTargets[Math.floor(Math.random() * possibleTargets.length)];
                            let tempX = this.x; let tempY = this.y;
                            this.x = target.x; this.y = target.y; target.x = tempX; target.y = tempY;
                            this.cooldown = 20; this.dashTimer = 0;
                        }
                    }
                    else if (this.role === 'ninja') {
                        if (minDist < 60 && minDist > 30) {
                            let orbitAngle = angle + (Math.PI / 2) * this.ninjaOrbitDir;
                            this.vx += Math.cos(orbitAngle) * 0.6; this.vy += Math.sin(orbitAngle) * 0.6;
                        } else {
                            this.vx += Math.cos(angle) * 0.4; this.vy += Math.sin(angle) * 0.4;
                        }
                    }
                    else if (this.role === 'archer') {
                        if (minDist < 300 && (wallOpen || Math.abs(this.x - nearestEnemy.x) > 30)) {
                            if (this.cooldown <= 0) {
                                projectiles.push(new Projectile(this.x, this.y, nearestEnemy, 8, this.team, 'normal'));
                                this.cooldown = 50;
                            }
                            if (minDist < 120) { this.vx -= Math.cos(angle) * 0.3; this.vy -= Math.sin(angle) * 0.3; }
                        } else {
                            this.vx += Math.cos(angle) * 0.2; this.vy += Math.sin(angle) * 0.2;
                        }
                    }
                    else if (this.dashTimer <= 0) {
                        let accel = this.isAnime ? 0.3 : 0.2;
                        if(this.role === 'kurama') accel = 0.1;
                        this.vx += Math.cos(angle) * accel; this.vy += Math.sin(angle) * accel;
                    }
                } else {
                    this.vx += (Math.random() - 0.5) * 0.5; this.vy += (Math.random() - 0.5) * 0.5;
                }

                this.vx *= 0.88; this.vy *= 0.88;
                if (this.freezeTimer > 0) speedLimit = 0.4; 
                let speed = Math.hypot(this.vx, this.vy);
                if (speed > speedLimit) { this.vx = (this.vx / speed) * speedLimit; this.vy = (this.vy / speed) * speedLimit; }

                this.x += this.vx; this.y += this.vy;
                if (this.freezeTimer > 0) this.freezeTimer--;

                if (!wallOpen && !this.isAnime) {
                    let centerX = canvas.width / 2;
                    if (this.team === 'blue' && this.x > centerX - 15) { this.x = centerX - 15; this.vx *= -0.5; } 
                    else if (this.team === 'red' && this.x < centerX + 15) { this.x = centerX + 15; this.vx *= -0.5; }
                }

                let rad = this.role === 'kurama' ? 30 : 15;
                if (this.x < rad) { this.x = rad; this.vx *= -0.5; }
                if (this.x > canvas.width - rad) { this.x = canvas.width - rad; this.vx *= -0.5; }
                if (this.y < rad) { this.y = rad; this.vy *= -0.5; }
                if (this.y > canvas.height - rad) { this.y = canvas.height - rad; this.vy *= -0.5; }

                // Standard Melee Damage
                if (nearestEnemy && this.role !== 'archer' && !['gojo','luffy'].includes(this.role) && this.dashTimer <= 0 && this.cooldown <= 0) {
                    const dist = Math.hypot(this.x - nearestEnemy.x, this.y - nearestEnemy.y);
                    let reach = this.role === 'kurama' ? 60 : (this.weapon === 'spear' ? 60 : 40);
                    
                    if (dist < reach && (wallOpen || this.isAnime || nearestEnemy.isAnime || Math.abs(this.x - nearestEnemy.x) > 30)) {
                        let dmg = 1.0;
                        if (this.role === 'knight') dmg = 2.5;
                        if (this.role === 'ninja') dmg = 1.5;
                        if (this.role === 'goku') dmg = 15.0;
                        if (this.role === 'naruto') dmg = 5.0;
                        if (this.role === 'kurama') dmg = 25.0;
                        if (this.hasFire) dmg *= 1.5;
                        if (this.weapon === 'sword') dmg += 1.0;
                        if (this.weapon === 'spear') dmg += 0.8;
                        
                        nearestEnemy.hp -= dmg;
                        nearestEnemy.flashTimer = 5; 
                        this.cooldown = this.role === 'kurama' ? 40 : (this.isAnime ? 15 : 25);
                        
                        let knockbackForce = this.role === 'kurama' ? 20 : (this.role === 'knight' ? 12 : 6);
                        let angleToEnemy = Math.atan2(nearestEnemy.y - this.y, nearestEnemy.x - this.x);
                        nearestEnemy.vx += Math.cos(angleToEnemy) * knockbackForce;
                        nearestEnemy.vy += Math.sin(angleToEnemy) * knockbackForce;

                        if (this.role !== 'kurama') {
                            this.vx -= Math.cos(angleToEnemy) * 2; this.vy -= Math.sin(angleToEnemy) * 2;
                        }
                        
                        if (this.hasIce) nearestEnemy.freezeTimer = 60; 
                        if (this.role === 'ninja') {
                            this.vx -= Math.cos(angleToEnemy) * 15; this.vy -= Math.sin(angleToEnemy) * 15;
                        }
                    }
                }
            }
        }

        canvas.addEventListener('mousedown', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left; const y = e.clientY - rect.top;

            if (currentPower.startsWith('spawn-')) {
                let role = currentPower.split('-')[1];
                let spawnTeam = ['luffy', 'gojo', 'naruto', 'goku'].includes(role) ? role : teams[currentTeamIdx];
                people.push(new Person(x, y, spawnTeam, role));
            } else {
                people.forEach(p => {
                    if (Math.hypot(p.x - x, p.y - y) < 60) {
                        if (currentPower === 'fire') { p.hasFire = true; p.hasIce = false; }
                        if (currentPower === 'ice') { p.hasIce = true; p.hasFire = false; }
                        if (currentPower === 'weapon' && !p.isAnime) p.weapon = Math.random() > 0.5 ? 'sword' : 'spear';
                        if (currentPower === 'strike') { p.hp = 0; p.flashTimer = 10; }
                    }
                });
            }
        });

        function drawBackground() {
            ctx.fillStyle = '#2d5a27'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = 'rgba(0,0,0,0.1)'; ctx.lineWidth = 1;
            for(let i=0; i<canvas.width; i+=50) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,canvas.height); ctx.stroke(); }
            for(let j=0; j<canvas.height; j+=50) { ctx.beginPath(); ctx.moveTo(0,j); ctx.lineTo(canvas.width,j); ctx.stroke(); }

            if (!wallOpen) { ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(canvas.width / 2 - 5, 0, 10, canvas.height); }
        }

        function animate() {
            drawBackground();
            people = people.filter(p => p.hp > 0);
            
            people.forEach(p => { p.update(); p.draw(); });
            projectiles.forEach(proj => { proj.update(); proj.draw(); });
            projectiles = projectiles.filter(p => p.active);

            document.getElementById('total-count').innerText = people.length;
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
