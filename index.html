<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>WebBox V9</title>
    <style>
        body { margin: 0; display: flex; background: #1a1a1a; color: white; font-family: sans-serif; overflow: hidden; }
        #sidebar { width: 260px; background: #333; height: 100vh; padding: 15px; box-sizing: border-box; border-right: 3px solid #444; overflow-y: auto; }
        #gameCanvas { background: #2d5a27; flex-grow: 1; cursor: crosshair; }
        button { width: 100%; padding: 10px; margin-bottom: 8px; cursor: pointer; background: #444; color: white; border: 1px solid #666; border-radius: 4px; }
        button:hover { background: #555; }
        button.active { background: #e67e22; border-color: #fff; }
        .wall-btn { background: #27ae60; margin-top: 10px; }
        .team-blue-btn { background: #3498db; }
        .team-red-btn { background: #e74c3c; }
        .stat-panel { background: #222; padding: 10px; border-radius: 5px; margin-bottom: 10px; font-size: 0.85em; }
        h2 { margin: 0 0 10px 0; color: #f1c40f; text-align: center; }
        hr { border: 0; border-top: 1px solid #555; margin: 10px 0; }
    </style>
</head>
<body>

    <div id="sidebar">
        <h2>WEBBOX V9</h2>
        <div class="stat-panel">
            Blue: <span id="count-blue">0</span> | Red: <span id="count-red">0</span><br>
            Tool: <span id="current-tool">Spawn Normal</span>
        </div>
        
        <button id="teamToggle" onclick="toggleTeam()" class="team-blue-btn">Current Team: BLUE</button>
        <hr>
        <button onclick="setPower('spawn-normal', this)" class="active">Spawn Normal</button>
        <button onclick="setPower('spawn-archer', this)">Spawn Archer</button>
        <button onclick="setPower('spawn-knight', this)">Spawn Knight</button>
        <button onclick="setPower('spawn-ninja', this)">Spawn Ninja</button>
        <button onclick="setPower('spawn-swapper', this)">Spawn Swapper</button>
        <button onclick="setPower('spawn-shifter', this)">Spawn Shifter</button>
        <button onclick="setPower('spawn-elephant', this)">Spawn Elephant</button>
        <hr>
        <button onclick="setPower('weapon', this)">Give Weapon</button>
        <button onclick="setPower('fire', this)">Fire Power</button>
        <button onclick="setPower('ice', this)">Ice Power</button>
        <button onclick="setPower('light', this)">Light Power</button>
        <button onclick="setPower('wind', this)">Wind Power</button>
        <button onclick="setPower('strike', this)">Lightning</button>
        <hr>
        <button class="wall-btn" onclick="toggleWall()">Toggle Wall: <span id="wall-status">CLOSED</span></button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const toolDisplay = document.getElementById('current-tool');

        let people = [];
        let projectiles = [];
        let currentPower = 'spawn-normal';
        let currentTeam = 'blue';
        let wallOpen = false;

        function resize() {
            canvas.width = window.innerWidth - 260;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        function toggleTeam() {
            let btn = document.getElementById('teamToggle');
            if (currentTeam === 'blue') {
                currentTeam = 'red';
                btn.className = 'team-red-btn';
                btn.innerText = 'Current Team: RED';
            } else {
                currentTeam = 'blue';
                btn.className = 'team-blue-btn';
                btn.innerText = 'Current Team: BLUE';
            }
        }

        function setPower(power, btn) {
            currentPower = power;
            toolDisplay.innerText = power.replace('spawn-', '').toUpperCase();
            document.querySelectorAll('button').forEach(b => {
                if(b.id !== 'teamToggle' && !b.classList.contains('wall-btn')) b.classList.remove('active');
            });
            btn.classList.add('active');
        }

        function toggleWall() {
            wallOpen = !wallOpen;
            document.getElementById('wall-status').innerText = wallOpen ? "OPEN" : "CLOSED";
        }

        class Projectile {
            constructor(x, y, target, dmg, team, type) {
                this.x = x;
                this.y = y;
                this.target = target;
                this.dmg = dmg;
                this.team = team;
                this.type = type; 
                let angle = Math.atan2(target.y - y, target.x - x);
                this.vx = Math.cos(angle) * 12;
                this.vy = Math.sin(angle) * 12;
                this.active = true;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) this.active = false;
                
                if (this.target && this.target.hp > 0 && Math.hypot(this.x - this.target.x, this.y - this.target.y) < (this.target.role === 'elephant' ? 45 : 25)) {
                    this.target.hp -= this.dmg;
                    this.target.flashTimer = 5;
                    
                    if (this.type === 'ice') {
                        this.target.freezeTimer = 80;
                    }
                    if (this.type === 'fire') {
                        this.target.hp -= 5; 
                    }
                    
                    let pushResist = this.target.role === 'elephant' ? 0.1 : 0.5;
                    this.target.vx += this.vx * pushResist;
                    this.target.vy += this.vy * pushResist;
                    this.active = false;
                }
            }
            draw() {
                ctx.fillStyle = this.type === 'fire' ? 'orange' : (this.type === 'ice' ? 'cyan' : 'white');
                ctx.beginPath();
                ctx.arc(this.x, this.y, 6, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        class Person {
            constructor(x, y, team, role) {
                this.x = x;
                this.y = y;
                this.team = team;
                this.role = role; 
                this.isShifter = (role === 'shifter');
                this.hp = role === 'elephant' ? 500 : (role === 'knight' ? 150 : (role === 'swapper' ? 120 : 100));
                
                this.hasFire = false;
                this.hasIce = false;
                this.hasLight = false;
                this.hasWind = false;
                this.weapon = null; 
                
                this.freezeTimer = 0; 
                this.blindTimer = 0;
                this.flashTimer = 0;
                this.cooldown = 0;
                this.powerCooldown = 0;
                this.dashTimer = 0;
                this.ninjaOrbitDir = Math.random() > 0.5 ? 1 : -1;

                this.vx = 0;
                this.vy = 0;
            }

            draw() {
                if (this.flashTimer > 0) {
                    ctx.fillStyle = 'white';
                    this.flashTimer--;
                } else {
                    let color = this.team === 'blue' ? '#3498db' : '#e74c3c';
                    if (this.hasFire) color = '#ff4500';
                    if (this.hasIce) color = '#a0e7ff'; 
                    ctx.fillStyle = color;
                }

                if (this.role === 'elephant') {
                    ctx.fillRect(this.x - 25, this.y - 20, 50, 40);
                    let dir = this.vx >= 0 ? 1 : -1;
                    ctx.fillRect(this.x + (25 * dir), this.y - 10, 15 * dir, 30);
                    ctx.fillStyle = 'white';
                    ctx.fillRect(this.x + (25 * dir), this.y, 12 * dir, 4);
                } else {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y - 16, 10, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillRect(this.x - 8, this.y - 6, 16, 24);
                    ctx.fillRect(this.x - 8, this.y + 18, 6, 14);
                    ctx.fillRect(this.x + 2, this.y + 18, 6, 14);

                    if (this.role === 'knight') {
                        ctx.fillStyle = 'gray';
                        ctx.fillRect(this.x - 10, this.y - 6, 20, 24); 
                    } else if (this.role === 'ninja') {
                        ctx.fillStyle = 'black';
                        ctx.fillRect(this.x - 8, this.y - 18, 16, 6); 
                    } else if (this.role === 'archer') {
                        ctx.fillStyle = '#2ecc71';
                        ctx.beginPath();
                        ctx.arc(this.x, this.y - 22, 6, 0, Math.PI); 
                        ctx.fill();
                    } else if (this.role === 'swapper') {
                        ctx.fillStyle = '#9b59b6';
                        ctx.fillRect(this.x - 9, this.y + 4, 18, 6);
                    }
                }

                if (this.isShifter) {
                    ctx.fillStyle = '#00ffff';
                    ctx.beginPath();
                    ctx.arc(this.x, this.y - 32, 5, 0, Math.PI * 2);
                    ctx.fill();
                }

                let auraSize = this.role === 'elephant' ? 60 : 40;
                
                if (this.hasLight) {
                    ctx.strokeStyle = 'yellow';
                    ctx.lineWidth = 4;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, auraSize + 4, 0, Math.PI * 2);
                    ctx.stroke();
                }
                if (this.hasFire && this.flashTimer <= 0) {
                    ctx.strokeStyle = 'red';
                    ctx.lineWidth = 4;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, auraSize, 0, Math.PI * 2);
                    ctx.stroke();
                }
                if (this.hasWind) {
                    ctx.strokeStyle = 'white';
                    ctx.lineWidth = 4;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, auraSize, 0, Math.PI * 2);
                    ctx.stroke();
                }

                if (this.blindTimer > 0) {
                    ctx.fillStyle = 'black';
                    ctx.beginPath();
                    ctx.arc(this.x, this.y - (this.role === 'elephant' ? 40 : 28), 10, 0, Math.PI * 2);
                    ctx.fill();
                }

                if (this.weapon && this.role !== 'elephant') {
                    ctx.strokeStyle = '#ddd';
                    ctx.lineWidth = 4;
                    ctx.beginPath();
                    let length = this.weapon === 'spear' ? 40 : 24;
                    let angle = Math.atan2(this.vy, this.vx);
                    ctx.moveTo(this.x, this.y);
                    ctx.lineTo(this.x + Math.cos(angle) * length, this.y + Math.sin(angle) * length);
                    ctx.stroke();
                }
                
                ctx.fillStyle = "white";
                ctx.font = "16px Arial";
                ctx.textAlign = "center";
                ctx.fillText(Math.ceil(this.hp), this.x, this.y - (this.role === 'elephant' ? 55 : 45));
            }

            update() {
                if (this.cooldown > 0) this.cooldown--;
                if (this.powerCooldown > 0) this.powerCooldown--;
                if (this.dashTimer > 0) this.dashTimer--;

                let nearestEnemy = null;
                let minDist = Infinity;

                if (this.hasWind) {
                    people.forEach(other => {
                        if (other.team !== this.team) {
                            let d = Math.hypot(this.x - other.x, this.y - other.y);
                            if (d < 100) {
                                let angle = Math.atan2(other.y - this.y, other.x - this.x);
                                let force = (100 - d) * 0.1;
                                other.vx += Math.cos(angle) * force;
                                other.vy += Math.sin(angle) * force;
                                other.hp -= 0.1; 
                            }
                        }
                    });
                }

                if (this.blindTimer <= 0) {
                    people.forEach(other => {
                        if (other.team !== this.team) {
                            let d = Math.hypot(this.x - other.x, this.y - other.y);
                            if (d < minDist) {
                                minDist = d;
                                nearestEnemy = other;
                            }
                        }
                    });
                } else {
                    this.blindTimer--;
                }

                if (this.isShifter && nearestEnemy && this.cooldown <= 0) {
                    let d = Math.hypot(this.x - nearestEnemy.x, this.y - nearestEnemy.y);
                    if (d < 60 && !nearestEnemy.isShifter) {
                        let stole = false;
                        if (nearestEnemy.role !== 'normal') {
                            this.role = nearestEnemy.role;
                            nearestEnemy.role = 'normal';
                            stole = true;
                        }
                        if (nearestEnemy.hasFire) { this.hasFire = true; nearestEnemy.hasFire = false; stole = true; }
                        if (nearestEnemy.hasIce) { this.hasIce = true; nearestEnemy.hasIce = false; stole = true; }
                        if (nearestEnemy.hasLight) { this.hasLight = true; nearestEnemy.hasLight = false; stole = true; }
                        if (nearestEnemy.hasWind) { this.hasWind = true; nearestEnemy.hasWind = false; stole = true; }
                        if (nearestEnemy.weapon) { this.weapon = nearestEnemy.weapon; nearestEnemy.weapon = null; stole = true; }
                        
                        if (stole) {
                            this.cooldown = 100;
                            nearestEnemy.flashTimer = 10;
                            nearestEnemy.vx -= Math.cos(Math.atan2(nearestEnemy.y - this.y, nearestEnemy.x - this.x)) * 15;
                            nearestEnemy.vy -= Math.sin(Math.atan2(nearestEnemy.y - this.y, nearestEnemy.x - this.x)) * 15;
                        }
                    }
                }

                let speedLimit = this.role === 'elephant' ? 1.5 : 3.0;
                if (this.dashTimer > 0) speedLimit = 15.0; 

                if (nearestEnemy) {
                    let angle = Math.atan2(nearestEnemy.y - this.y, nearestEnemy.x - this.x);
                    
                    if ((this.hasFire || this.hasIce) && minDist < 300 && this.powerCooldown <= 0 && (wallOpen || Math.abs(this.x - nearestEnemy.x) > 30)) {
                        let type = this.hasFire ? 'fire' : 'ice';
                        projectiles.push(new Projectile(this.x, this.y, nearestEnemy, 10, this.team, type));
                        this.powerCooldown = 60;
                        this.vx -= Math.cos(angle) * 5; 
                        this.vy -= Math.sin(angle) * 5;
                    }

                    if (this.role !== 'archer' && this.role !== 'elephant' && minDist < 150 && minDist > 50 && this.cooldown <= 0 && this.dashTimer <= 0) {
                        this.dashTimer = 10;
                        this.cooldown = 80;
                        this.vx += Math.cos(angle) * 15;
                        this.vy += Math.sin(angle) * 15;
                    }

                    if (this.role === 'swapper' && this.cooldown <= 0 && minDist < 100) {
                        let possibleTargets = people.filter(p => p !== this);
                        if (possibleTargets.length > 0) {
                            let target = possibleTargets[Math.floor(Math.random() * possibleTargets.length)];
                            let tempX = this.x;
                            let tempY = this.y;
                            this.x = target.x;
                            this.y = target.y;
                            target.x = tempX;
                            target.y = tempY;
                            this.cooldown = 120; 
                        }
                    }
                    else if (this.role === 'knight' && this.hp < 20) {
                        this.vx -= Math.cos(angle) * 0.4; 
                        this.vy -= Math.sin(angle) * 0.4;
                        speedLimit = 4.0; 
                    } 
                    else if (this.role === 'ninja') {
                        speedLimit = 5.0;
                        if (minDist < 60 && minDist > 30) {
                            let orbitAngle = angle + (Math.PI / 2) * this.ninjaOrbitDir;
                            this.vx += Math.cos(orbitAngle) * 0.6;
                            this.vy += Math.sin(orbitAngle) * 0.6;
                        } else {
                            this.vx += Math.cos(angle) * 0.4;
                            this.vy += Math.sin(angle) * 0.4;
                        }
                    }
                    else if (this.role === 'archer') {
                        if (minDist < 300 && (wallOpen || Math.abs(this.x - nearestEnemy.x) > 30)) {
                            if (this.cooldown <= 0) {
                                projectiles.push(new Projectile(this.x, this.y, nearestEnemy, 8, this.team, 'normal'));
                                this.cooldown = 50;
                            }
                            if (minDist < 120) {
                                this.vx -= Math.cos(angle) * 0.3;
                                this.vy -= Math.sin(angle) * 0.3;
                            }
                        } else {
                            this.vx += Math.cos(angle) * 0.2;
                            this.vy += Math.sin(angle) * 0.2;
                        }
                    }
                    else if (this.dashTimer <= 0) {
                        let accel = this.role === 'elephant' ? 0.08 : 0.2;
                        this.vx += Math.cos(angle) * accel; 
                        this.vy += Math.sin(angle) * accel;
                    }
                } else {
                    let wander = this.role === 'elephant' ? 0.2 : 0.5;
                    this.vx += (Math.random() - 0.5) * wander;
                    this.vy += (Math.random() - 0.5) * wander;
                }

                this.vx *= 0.88;
                this.vy *= 0.88;

                if (this.freezeTimer > 0) speedLimit = 0.4; 
                let speed = Math.hypot(this.vx, this.vy);
                if (speed > speedLimit) {
                    this.vx = (this.vx / speed) * speedLimit;
                    this.vy = (this.vy / speed) * speedLimit;
                }

                this.x += this.vx;
                this.y += this.vy;
                
                if (this.freezeTimer > 0) this.freezeTimer--;

                if (!wallOpen) {
                    let centerX = canvas.width / 2;
                    let rad = this.role === 'elephant' ? 25 : 15;
                    if (this.team === 'blue' && this.x > centerX - rad) {
                        this.x = centerX - rad;
                        this.vx *= -0.5;
                    } else if (this.team === 'red' && this.x < centerX + rad) {
                        this.x = centerX + rad;
                        this.vx *= -0.5;
                    }
                }

                let rad = this.role === 'elephant' ? 25 : 15;
                if (this.x < rad) { this.x = rad; this.vx *= -0.5; }
                if (this.x > canvas.width - rad) { this.x = canvas.width - rad; this.vx *= -0.5; }
                if (this.y < rad) { this.y = rad; this.vy *= -0.5; }
                if (this.y > canvas.height - rad) { this.y = canvas.height - rad; this.vy *= -0.5; }

                if (nearestEnemy && this.role !== 'archer' && this.dashTimer <= 0 && this.cooldown <= 0) {
                    const dist = Math.hypot(this.x - nearestEnemy.x, this.y - nearestEnemy.y);
                    let reach = this.role === 'elephant' ? 70 : (this.weapon === 'spear' ? 60 : 40);
                    
                    if (dist < reach && (wallOpen || Math.abs(this.x - nearestEnemy.x) > 30)) {
                        let dmg = 1.0;
                        if (this.role === 'elephant') dmg = 8.0;
                        if (this.role === 'knight') dmg = 2.5;
                        if (this.role === 'ninja') dmg = 1.5;
                        if (this.hasFire) dmg *= 1.5;
                        if (this.weapon === 'sword') dmg += 1.0;
                        if (this.weapon === 'spear') dmg += 0.8;
                        if (this.hasLight) dmg += 1.5;
                        
                        nearestEnemy.hp -= dmg;
                        nearestEnemy.flashTimer = 5; 
                        this.cooldown = this.role === 'elephant' ? 40 : 15;
                        
                        let knockbackForce = this.role === 'elephant' ? 25 : (this.role === 'knight' ? 12 : 6);
                        let pushResist = nearestEnemy.role === 'elephant' ? 0.2 : 1;
                        let angleToEnemy = Math.atan2(nearestEnemy.y - this.y, nearestEnemy.x - this.x);
                        nearestEnemy.vx += Math.cos(angleToEnemy) * (knockbackForce * pushResist);
                        nearestEnemy.vy += Math.sin(angleToEnemy) * (knockbackForce * pushResist);

                        if (this.role !== 'elephant') {
                            this.vx -= Math.cos(angleToEnemy) * 2;
                            this.vy -= Math.sin(angleToEnemy) * 2;
                        }
                        
                        if (this.hasIce) {
                            nearestEnemy.freezeTimer = 60; 
                        }
                        if (this.hasLight) nearestEnemy.blindTimer = 80;
                        
                        if (this.role === 'ninja') {
                            this.vx -= Math.cos(angleToEnemy) * 15;
                            this.vy -= Math.sin(angleToEnemy) * 15;
                        }
                    }
                }
            }
        }

        canvas.addEventListener('mousedown', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            if (currentPower.startsWith('spawn-')) {
                let role = currentPower.split('-')[1];
                people.push(new Person(x, y, currentTeam, role));
            } else {
                people.forEach(p => {
                    const dist = Math.hypot(p.x - x, p.y - y);
                    let hitDist = p.role === 'elephant' ? 120 : 100;
                    if (dist < hitDist) {
                        if (currentPower === 'fire') { p.hasFire = true; p.hasIce = false; p.hasLight = false; p.hasWind = false; }
                        if (currentPower === 'ice') { p.hasIce = true; p.hasFire = false; p.hasLight = false; p.hasWind = false; }
                        if (currentPower === 'light') { p.hasLight = true; p.hasFire = false; p.hasIce = false; p.hasWind = false; }
                        if (currentPower === 'wind') { p.hasWind = true; p.hasFire = false; p.hasIce = false; p.hasLight = false; }
                        if (currentPower === 'weapon' && p.role !== 'elephant') p.weapon = Math.random() > 0.5 ? 'sword' : 'spear';
                        if (currentPower === 'strike') { p.hp = 0; p.flashTimer = 10; }
                    }
                });
            }
        });

        function animate() {
            ctx.fillStyle = '#2d5a27';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (!wallOpen) {
                ctx.fillStyle = '#555';
                ctx.fillRect(canvas.width / 2 - 5, 0, 10, canvas.height);
            }

            people = people.filter(p => p.hp > 0);
            
            let b = 0, r = 0;
            people.forEach(p => {
                p.team === 'blue' ? b++ : r++;
                p.update();
                p.draw();
            });
            
            projectiles.forEach(proj => {
                proj.update();
                proj.draw();
            });
            projectiles = projectiles.filter(p => p.active);

            document.getElementById('count-blue').innerText = b;
            document.getElementById('count-red').innerText = r;
            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
